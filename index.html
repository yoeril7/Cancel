<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#f59e0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Cancel Muur - Raptors 25-4</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png">
<style>
:root{--bg:#070b10;--panel:#0d141c;--panel2:#121c27;--line:rgba(255,255,255,.12);--gold:#f6b72d;--gold2:#a9670e;--silver:#d6d9df;--bronze:#c87933;--green:#42b43d;--red:#ca3028;--blue:#2174c9;--text:#f7f3e8;--muted:#aab1bb;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,Roboto,system-ui,-apple-system,Segoe UI,sans-serif}body{touch-action:manipulation;user-select:none;background:radial-gradient(circle at 50% -10%,rgba(245,158,11,.28),transparent 40%),linear-gradient(180deg,#090e16 0%,#05070a 100%)}
.app{height:100dvh;width:100vw;padding:calc(10px + var(--safe-top)) 10px calc(8px + var(--safe-bottom));display:grid;grid-template-rows:auto auto 1fr auto;gap:8px;position:relative;isolation:isolate}.app:before{content:"";position:absolute;inset:0;background:url('assets/raptors-logo.jpeg') center 34%/130% auto no-repeat;opacity:.09;filter:blur(.3px) saturate(1.2);z-index:-2}.app:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,11,16,.45),rgba(7,11,16,.98) 56%,#05070a);z-index:-1}.hero{display:grid;grid-template-columns:92px 1fr;gap:10px;align-items:center;min-height:118px}.logoWrap{width:92px;height:92px;border-radius:22px;padding:3px;background:linear-gradient(145deg,var(--gold),#fff0a5 32%,#08090a 33%,#070707);box-shadow:0 0 22px rgba(245,158,11,.45),0 8px 25px rgba(0,0,0,.7);overflow:hidden}.logoWrap img{width:100%;height:100%;object-fit:cover;border-radius:18px}.titleBox{min-width:0}.eyebrow{letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:900;font-size:12px;text-shadow:0 0 10px #000}.title{font-weight:1000;font-size:clamp(42px,11vw,62px);line-height:.9;letter-spacing:-.05em;text-transform:uppercase;text-shadow:0 3px 0 #000,0 0 16px rgba(245,158,11,.45)}.title span{color:var(--gold);background:linear-gradient(#ffe29a,#f59e0b 45%,#6f3d07);-webkit-background-clip:text;background-clip:text;color:transparent}.className{display:inline-flex;margin-top:6px;padding:7px 12px;border:1px solid rgba(245,183,45,.55);border-radius:999px;background:linear-gradient(180deg,#1a2430,#070b10);font-weight:1000;color:#ffe2a3;letter-spacing:.08em;box-shadow:inset 0 0 14px rgba(245,158,11,.16)}
.champ{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;border:1px solid rgba(245,183,45,.42);border-radius:18px;padding:10px 12px;background:linear-gradient(135deg,rgba(246,183,45,.22),rgba(12,18,25,.9) 55%),linear-gradient(180deg,#172230,#080c12);box-shadow:0 0 18px rgba(245,158,11,.25),inset 0 1px 0 rgba(255,255,255,.1)}.champLabel{font-size:12px;color:var(--gold);font-weight:1000;text-transform:uppercase;letter-spacing:.12em}.champName{font-size:28px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.champStats{text-align:right}.champDuck{font-size:34px;filter:drop-shadow(0 0 10px rgba(245,183,45,.8))}.champCount{font-size:34px;font-weight:1000;color:var(--gold);line-height:.85}.champSub{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase}.meter{grid-column:1/-1;height:10px;border-radius:999px;background:#19222b;overflow:hidden;border:1px solid rgba(255,255,255,.1)}.meter i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#73d13d,#f6c343,#e5472f);border-radius:999px;transition:width .35s ease}
.board{min-height:0;display:flex;flex-direction:column;gap:5px}.row{position:relative;display:grid;grid-template-columns:42px 1fr 48px 96px;align-items:center;gap:7px;min-height:0;flex:1;border:1px solid var(--line);border-radius:13px;padding:4px 6px;background:linear-gradient(180deg,rgba(21,32,43,.86),rgba(8,13,19,.92));box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 3px 10px rgba(0,0,0,.28);overflow:hidden}.row.gold{border-color:rgba(246,183,45,.85);background:linear-gradient(90deg,rgba(246,183,45,.28),rgba(12,18,25,.94));box-shadow:0 0 18px rgba(245,158,11,.28),inset 0 1px 0 rgba(255,255,255,.1)}.row.silver{border-color:rgba(214,217,223,.62)}.row.bronze{border-color:rgba(200,121,51,.75)}.row.pilot{border-color:rgba(33,116,201,.9);background:linear-gradient(90deg,rgba(33,116,201,.35),rgba(8,13,19,.96))}.row.flash{animation:flash .42s ease}@keyframes flash{0%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.012);filter:brightness(1.65)}100%{transform:scale(1);filter:brightness(1)}}.rank{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:#0a0f15;border:1px solid rgba(255,255,255,.14);font-weight:1000;font-size:18px;color:#d8dde4;box-shadow:inset 0 2px 7px rgba(255,255,255,.06)}.gold .rank{color:#1b1202;background:radial-gradient(circle at 35% 28%,#fff3b0,#f6b72d 45%,#855306);border-color:#fff0a5}.silver .rank{color:#111;background:radial-gradient(circle at 35% 28%,#fff,#c7ccd3 48%,#626875)}.bronze .rank{color:#1b0c04;background:radial-gradient(circle at 35% 28%,#ffdbad,#c87933 52%,#66330d)}.person{min-width:0;display:flex;align-items:center;gap:8px}.badge{font-size:24px;width:30px;text-align:center;filter:drop-shadow(0 2px 4px #000)}.name{font-weight:1000;font-size:clamp(18px,5vw,28px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}.pilotTag{display:block;color:#8fd1ff;font-size:10px;font-weight:1000;text-transform:uppercase;letter-spacing:.12em;line-height:1}.count{justify-self:end;font-size:clamp(23px,6vw,34px);font-weight:1000;color:var(--gold);text-shadow:0 2px 0 #000}.controls{display:grid;grid-template-columns:1fr 1fr;gap:7px}.ctrl{height:40px;border:0;border-radius:10px;color:#fff;font-size:29px;font-weight:1000;line-height:1;box-shadow:inset 0 2px 0 rgba(255,255,255,.25),0 3px 8px rgba(0,0,0,.45);display:grid;place-items:center}.plus{background:linear-gradient(#60c84d,#247818)}.minus{background:linear-gradient(#e25247,#8d1713)}.epaulet{width:42px;height:28px;border-radius:6px;background:linear-gradient(135deg,#050505,#2b2b2b);border:1px solid #66501a;display:flex;align-items:center;justify-content:center;gap:2px;transform:rotate(-15deg);box-shadow:0 4px 10px #000}.epaulet b{width:5px;height:20px;background:linear-gradient(#ffe88c,#e09d19 55%,#7b4605);border-radius:2px}.epaulet:after{content:'★';color:#e7ae29;font-size:9px;margin-left:2px}.toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.tool{border:1px solid rgba(255,255,255,.14);border-radius:14px;min-height:52px;background:linear-gradient(180deg,#16212d,#080c12);color:var(--text);font-weight:1000;text-transform:uppercase;font-size:12px;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}.tool.red{color:#ff6b5f}.tool.green{color:#95e15e}.tool.blue{color:#8ecbff}.footer{text-align:center;color:rgba(255,255,255,.35);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;padding-top:2px}.toast{position:fixed;left:50%;top:42%;transform:translate(-50%,-50%) scale(.8);opacity:0;pointer-events:none;z-index:20;font-size:42px;font-weight:1000;color:var(--gold);text-shadow:0 4px 0 #000,0 0 22px rgba(245,158,11,.8);background:rgba(7,11,16,.75);border:2px solid rgba(245,183,45,.6);border-radius:22px;padding:12px 22px;box-shadow:0 12px 35px rgba(0,0,0,.6)}.toast.show{animation:toast .75s ease}@keyframes toast{0%{opacity:0;transform:translate(-50%,-50%) scale(.7) rotate(-6deg)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(3deg)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(.9)}}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;place-items:center;z-index:30;padding:22px}.modal.show{display:grid}.card{width:min(520px,94vw);border:1px solid rgba(245,183,45,.35);border-radius:22px;background:linear-gradient(180deg,#172230,#070b10);padding:18px;box-shadow:0 20px 60px #000}.card h2{margin:0 0 12px;color:var(--gold)}textarea{width:100%;height:180px;border-radius:12px;border:1px solid rgba(255,255,255,.18);background:#06090d;color:#fff;padding:10px}.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.duckParticle{position:fixed;pointer-events:none;z-index:25;font-size:24px;animation:fly 900ms ease-out forwards}@keyframes fly{to{transform:translate(var(--x),var(--y)) rotate(25deg) scale(.3);opacity:0}}
@media(max-height:760px){.hero{min-height:100px;grid-template-columns:78px 1fr}.logoWrap{width:78px;height:78px}.title{font-size:42px}.className{font-size:12px;padding:5px 10px}.champ{padding:7px 10px}.champName{font-size:23px}.champCount{font-size:28px}.row{border-radius:10px;padding:2px 5px;gap:5px;grid-template-columns:36px 1fr 42px 84px}.rank{width:31px;height:31px;font-size:16px}.badge{font-size:20px;width:25px}.name{font-size:18px}.count{font-size:25px}.ctrl{height:34px;font-size:24px}.toolbar{gap:6px}.tool{min-height:44px;font-size:11px}.footer{display:none}}
@media(min-width:700px){.app{max-width:560px;margin:0 auto;padding-left:14px;padding-right:14px}.hero{grid-template-columns:110px 1fr}.logoWrap{width:110px;height:110px}.row{grid-template-columns:46px 1fr 56px 108px}.ctrl{height:42px}.name{font-size:27px}}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="logoWrap"><img src="assets/raptors-logo.jpeg" alt="Raptors 25-4 logo"></div>
    <div class="titleBox"><div class="eyebrow">Raptors 25-4 presenteert</div><div class="title">Cancel <span>Muur</span></div><div class="className">RAPTORS 25-4</div></div>
  </header>
  <section class="champ" id="champ"></section>
  <main class="board" id="board"></main>
  <section class="toolbar">
    <button class="tool red" id="resetBtn">↻ Reset</button>
    <button class="tool green" id="soundBtn">🔊 Geluid aan</button>
    <button class="tool blue" id="exportBtn">⇩ Export</button>
  </section>
  <div class="footer">Cancel met respect. Vlieg met trots.</div>
</div>
<div class="toast" id="toast">KWAAK!</div>
<div class="modal" id="modal"><div class="card"><h2>Scores exporteren</h2><textarea id="exportText" readonly></textarea><div class="modalActions"><button class="tool" id="copyBtn">Kopieer</button><button class="tool red" id="closeBtn">Sluiten</button></div></div></div>
<script>
const NAMES=['Rookveel','Kietelt','Byrropet','DORA Sheet','Adtje Stess','Kapitein Kontschroef','Niek','DFEend','Rookcie','Spaanse Kraag','Bukkwaake','Neermis','Dagobert Cuck'];
const KEY='cancelMuurRaptors254PortraitV1';
const SOUND_KEY='cancelMuurSoundOn';
let people=load();let soundOn=localStorage.getItem(SOUND_KEY)!=='0';let lastLeader=null;
const board=document.getElementById('board'),champ=document.getElementById('champ'),toast=document.getElementById('toast');
function load(){try{const old=JSON.parse(localStorage.getItem(KEY));if(Array.isArray(old)){const map=new Map(old.map(p=>[p.name,p.cancels||0]));return NAMES.map(name=>({name,cancels:map.get(name)||0}));}}catch(e){}return NAMES.map(name=>({name,cancels:0}));}
function save(){localStorage.setItem(KEY,JSON.stringify(people));}
function sorted(){return [...people].sort((a,b)=>b.cancels-a.cancels||NAMES.indexOf(a.name)-NAMES.indexOf(b.name));}
function badge(i,len){if(i===0)return '🥇🦆';if(i===1)return '🥈🦆';if(i===2)return '🥉🦆';if(i===len-1)return '<span class="epaulet"><b></b><b></b><b></b><b></b></span>';return '';}
function rowClass(i,len){return i===0?'gold':i===1?'silver':i===2?'bronze':i===len-1?'pilot':'';}
function render(flashName){const s=sorted();const top=s[0];const max=Math.max(1,top.cancels);champ.innerHTML=`<div><div class="champLabel">🏆 Muur van Schaamte</div><div class="champName">${top.name}</div><div class="champSub">Meest gecanceld</div></div><div class="champStats"><div class="champDuck">🦆</div><div class="champCount">${top.cancels}</div><div class="champSub">cancels</div></div><div class="meter"><i style="width:${Math.min(100,top.cancels*10)}%"></i></div>`;board.innerHTML='';s.forEach((p,i)=>{const r=document.createElement('div');r.className=`row ${rowClass(i,s.length)} ${p.name===flashName?'flash':''}`;r.innerHTML=`<div class="rank">${i+1}</div><div class="person"><span class="badge">${badge(i,s.length)}</span><div class="nameWrap"><div class="name">${p.name}</div>${i===s.length-1?'<span class="pilotTag">Piloot - vliegt het meest</span>':''}</div></div><div class="count">${p.cancels}</div><div class="controls"><button class="ctrl plus" data-name="${p.name}">+</button><button class="ctrl minus" data-name="${p.name}">−</button></div>`;board.appendChild(r);});document.getElementById('soundBtn').textContent=soundOn?'🔊 Geluid aan':'🔇 Geluid uit';}
function change(name,delta,btn){const p=people.find(x=>x.name===name);if(!p)return;const before=sorted()[0]?.name;p.cancels=Math.max(0,p.cancels+delta);save();render(name);if(delta>0){kwaak();showToast();duckBurst(btn);navigator.vibrate&&navigator.vibrate(35);}else{navigator.vibrate&&navigator.vibrate(18);}const after=sorted()[0]?.name;if(delta>0&&after!==before)bigMoment();}
function showToast(){toast.classList.remove('show');void toast.offsetWidth;toast.classList.add('show');}
function kwaak(){if(!soundOn)return;try{const A=window.AudioContext||window.webkitAudioContext;const ctx=new A();const now=ctx.currentTime;const g=ctx.createGain();g.connect(ctx.destination);g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(.22,now+.025);g.gain.exponentialRampToValueAtTime(.0001,now+.34);[180,230,150].forEach((f,idx)=>{const o=ctx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(f,now+idx*.055);o.frequency.exponentialRampToValueAtTime(f*.62,now+.19+idx*.03);const filter=ctx.createBiquadFilter();filter.type='lowpass';filter.frequency.setValueAtTime(750,now);o.connect(filter);filter.connect(g);o.start(now+idx*.045);o.stop(now+.31+idx*.03);});setTimeout(()=>ctx.close(),600);}catch(e){}}
function duckBurst(btn){if(!btn)return;const rect=btn.getBoundingClientRect();for(let i=0;i<7;i++){const d=document.createElement('div');d.className='duckParticle';d.textContent=i%2?'🦆':'✨';d.style.left=rect.left+rect.width/2+'px';d.style.top=rect.top+rect.height/2+'px';d.style.setProperty('--x',(Math.random()*160-80)+'px');d.style.setProperty('--y',(-80-Math.random()*90)+'px');document.body.appendChild(d);setTimeout(()=>d.remove(),950);}}
function bigMoment(){document.body.animate([{filter:'brightness(1)'},{filter:'brightness(1.35)'},{filter:'brightness(1)'}],{duration:450});}
board.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;change(b.dataset.name,b.classList.contains('plus')?1:-1,b);});
document.getElementById('resetBtn').onclick=()=>{if(confirm('Alles resetten?')){people=NAMES.map(name=>({name,cancels:0}));save();render();}};
document.getElementById('soundBtn').onclick=()=>{soundOn=!soundOn;localStorage.setItem(SOUND_KEY,soundOn?'1':'0');render();if(soundOn)kwaak();};
const modal=document.getElementById('modal'),text=document.getElementById('exportText');document.getElementById('exportBtn').onclick=()=>{text.value=JSON.stringify({app:'Cancel Muur',class:'Raptors 25-4',date:new Date().toISOString(),scores:sorted()},null,2);modal.classList.add('show');text.select();};document.getElementById('closeBtn').onclick=()=>modal.classList.remove('show');document.getElementById('copyBtn').onclick=()=>navigator.clipboard&&navigator.clipboard.writeText(text.value);modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('show')});
if('serviceWorker'in navigator){navigator.serviceWorker.register('./service-worker.js').catch(()=>{});}render();
</script>
</body>
</html>
